name: DB Security Checks

on:
  pull_request:
    paths:
      - "supabase/migrations/**"
      - "scripts/check-db-security.mjs"
      - ".security-check-allow.json"
      - ".github/workflows/db-security-checks.yml"
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - "scripts/check-db-security.mjs"
      - ".security-check-allow.json"

jobs:
  scan:
    name: Scan migrations for risky RLS / DEFINER patterns
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run static DB security checks
        id: scan
        run: node scripts/check-db-security.mjs

      - name: Upload findings report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: db-security-findings
          path: reports/db-security/
          if-no-files-found: warn
          retention-days: 30

      - name: Append summary
        if: always()
        run: |
          if [ -f reports/db-security/findings.json ]; then
            node -e "
              const r = JSON.parse(require('fs').readFileSync('reports/db-security/findings.json','utf8'));
              const t = r.totals;
              const out = \`## DB Security Scan\n\n\` +
                \`- Scanned files: **\${r.scannedFiles}**\n\` +
                \`- Total findings: **\${t.all}**\n\` +
                \`- Unsuppressed: **\${t.unsuppressed}**\n\` +
                \`- Suppressed by inline comment: **\${t.suppressedByComment}**\n\` +
                \`- Suppressed by allowlist: **\${t.suppressedByAllowlist}**\n\n\` +
                \`Full report uploaded as artifact \\\`db-security-findings\\\` (JSON + HTML).\n\`;
              require('fs').appendFileSync(process.env.GITHUB_STEP_SUMMARY, out);
            "
          fi
